<!DOCTYPE html>
<html lang="en" data-theme="light">

  <!-- Navigation Bar -->
  <nav class="navbar" id="main-nav-bar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <img src="assets/icons/icon-192.png" alt="Logo">
        <span>resQ<span class="logo-accent">paws</span></span>
      </a>
      
      <button class="nav-toggle" id="nav-toggle-btn" aria-label="Toggle Menu">☰</button>
      
      <div class="nav-links" id="nav-links-menu">
        <a href="index.html" class="nav-link" data-i18n="navHome">Home</a>
        <a href="about.html" class="nav-link" data-i18n="navAbout">About Us</a>
        <a href="adopt.html" class="nav-link" data-i18n="navAdopt">Adopt</a>
        <a href="report.html" class="nav-link" data-i18n="navReport">Report Emergency</a>
        <a href="lost-found.html" class="nav-link" data-i18n="navLostFound">Lost & Found</a>
        <a href="user-dashboard.html" class="nav-link" id="nav-dashboard-link" style="display: none;" data-i18n="navDashboard">Dashboard</a>
        
        <div class="nav-actions">
          <button class="theme-toggle" id="theme-toggle-btn" aria-label="Toggle Theme"></button>
          <a href="login.html" class="btn btn-primary btn-sm" id="nav-login-btn" data-i18n="navLogin">Login</a>
          <a href="#" class="btn btn-outline btn-sm" id="nav-logout-btn" style="display: none;" data-i18n="navLogout">Logout</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="page-section container" style="min-height: 60vh;">
    <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
      <div style="text-align: left;">
        <h2>My Adoption Applications</h2>
        <p class="text-muted">Track the status of the pets you've applied to adopt.</p>
      </div>
      <a href="adopt.html" class="btn btn-primary">Find a Pet</a>
    </div>

    <div class="glass-card" style="padding: 24px 0; margin-bottom: 32px;">
      <div class="data-table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>Animal Name</th>
              <th>Date Applied</th>
              <th>Status</th>
              <th>Next Steps</th>
            </tr>
          </thead>
          <tbody id="user-adoptions-list-body">
            <!-- Loaded dynamically -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <footer class="footer" style="margin-top: 100px;">
    <div class="footer-bottom">
      <p data-i18n="footerCopy">© 2026 resQpaws Animal Welfare Foundation. All rights reserved.</p>
    </div>
